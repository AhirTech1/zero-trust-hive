# ─────────────────────────────────────────────────────────────────────────────
# GitHub Actions — Automatic Open-Source Release Pipeline
# ─────────────────────────────────────────────────────────────────────────────
# This workflow is triggered inherently by pushing tags (e.g., `git push --tags`)
# that match the standard `v*` semantic version format.
# It leverages GoReleaser to dynamically compile all binaries defined in
# .goreleaser.yaml and posts them elegantly to the repository's Releases page.
# ─────────────────────────────────────────────────────────────────────────────
name: Release Zero-Trust Hive

on:
  push:
    # Trigger on any tags matching v* (e.g., v1.0.0, v1.1.0-rc1)
    tags:
      - 'v*'

permissions:
  # The 'contents: write' permission gives the underlying GITHUB_TOKEN exactly
  # the authority needed to draft the release and upload the archive files.
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 ensures GoReleaser has the whole commit graph,
          # allowing it to effectively construct automated changelogs.
          fetch-depth: 0

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
