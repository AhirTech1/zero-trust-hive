# ─────────────────────────────────────────────────────────────────────────────
# Zero-Trust Hive — GoReleaser Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Defines how the monorepo's three binaries (hive, gateway, agent) are
# cross-compiled, stripped, and packaged into a single archive per platform
# for GitHub Releases.
#
# Triggered by: git tag v1.0.0 && git push --tags
# ─────────────────────────────────────────────────────────────────────────────

version: 2

before:
  hooks:
    - go mod tidy

# ─────────────────────────────────────────────────────────────────────────────
# Builds — three binaries, all cross-compiled for Linux, macOS, and Windows
# ─────────────────────────────────────────────────────────────────────────────

builds:
  - id: hive-cli
    main: ./cmd/cli
    binary: hive
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/zero-trust-hive/cli/internal/tui.Version={{.Version}}

  - id: hive-gateway
    main: ./cmd/gateway
    binary: gateway
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

  - id: hive-agent
    main: ./cmd/agent
    binary: agent
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

# ─────────────────────────────────────────────────────────────────────────────
# Archives — bundle ALL THREE binaries into a SINGLE archive per platform
# ─────────────────────────────────────────────────────────────────────────────
# This is critical: the install.sh and install.ps1 scripts expect to find
# hive, gateway, and agent in the same archive file.
#
# Archive naming (matches install scripts):
#   zero-trust-hive_1.0.0_linux_amd64.tar.gz
#   zero-trust-hive_1.0.0_darwin_arm64.tar.gz
#   zero-trust-hive_1.0.0_windows_amd64.zip
# ─────────────────────────────────────────────────────────────────────────────

archives:
  - id: default
    ids:
      - hive-cli
      - hive-gateway
      - hive-agent
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'

# ─────────────────────────────────────────────────────────────────────────────
# Release — GitHub Release settings
# ─────────────────────────────────────────────────────────────────────────────

release:
  github:
    owner: AhirTech1
    name: zero-trust-hive
  draft: false
  prerelease: auto
  name_template: "Zero-Trust Hive {{.Version}}"
  header: |
    ## 🐝 Zero-Trust Hive {{.Version}}

    Secure AI Agent Execution Tunnel — `ngrok` for AI agents.

    ### Installation

    **Linux / macOS:**
    ```bash
    curl -sSfL https://raw.githubusercontent.com/AhirTech1/zero-trust-hive/main/install.sh | bash
    ```

    **Windows (PowerShell):**
    ```powershell
    iwr https://raw.githubusercontent.com/AhirTech1/zero-trust-hive/main/install.ps1 -useb | iex
    ```
  footer: |
    **Full Changelog**: https://github.com/AhirTech1/zero-trust-hive/compare/{{ .PreviousTag }}...{{ .Tag }}
